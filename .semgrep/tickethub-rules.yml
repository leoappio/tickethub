rules:
  - id: efcore-fromsqlraw-injection
    languages: [csharp]
    severity: ERROR
    message: >
      Raw SQL executed via FromSqlRaw. If any part of the query string is built
      from user input through concatenation/interpolation, this is a SQL
      injection (CWE-89). Use parameters (FromSqlInterpolated or {0} placeholders).
    metadata:
      cwe: "CWE-89: SQL Injection"
      owasp: "A03:2021 - Injection"
    patterns:
      - pattern: $X.FromSqlRaw(...)

  - id: weak-password-hash-md5-sha1
    languages: [csharp]
    severity: ERROR
    message: >
      Weak cryptographic hash (MD5/SHA1) used. These are unsuitable for password
      storage (CWE-327/CWE-916). Use a memory-hard KDF such as PBKDF2, bcrypt or Argon2.
    metadata:
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp: "A02:2021 - Cryptographic Failures"
    patterns:
      - pattern-either:
          - pattern: System.Security.Cryptography.MD5.Create()
          - pattern: MD5.Create()
          - pattern: SHA1.Create()
          - pattern: new MD5CryptoServiceProvider()

  - id: permissive-cors-any-origin
    languages: [csharp]
    severity: WARNING
    message: >
      CORS policy allows any origin (AllowAnyOrigin). Combined with credentials or
      state-changing endpoints this enables cross-site abuse (CWE-942).
    metadata:
      cwe: "CWE-942: Permissive Cross-domain Policy"
      owasp: "A05:2021 - Security Misconfiguration"
    patterns:
      - pattern: $X.AllowAnyOrigin()

  - id: hardcoded-secret-in-source
    languages: [csharp]
    severity: ERROR
    message: >
      Possible hardcoded credential/secret in source code (CWE-798). Move secrets
      to a secret manager or environment variables.
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
    patterns:
      - pattern-regex: '(?i)(password|secret|pepper|api[_-]?key|signing[_-]?key|["'']?Key["'']?)\s*=\s*"[A-Za-z0-9+/_\-\.@!]{16,}"'

  - id: raw-html-response-xss
    languages: [csharp]
    severity: ERROR
    message: >
      HTML response body assembled manually and returned as text/html. If user
      input is concatenated without HTML-encoding this is a Cross-Site Scripting
      sink (CWE-79). Use Razor (auto-encoded) or HtmlEncoder.Encode.
    metadata:
      cwe: "CWE-79: Cross-site Scripting"
      owasp: "A03:2021 - Injection"
    patterns:
      - pattern-regex: 'ContentType\s*=\s*"text/html"'
